<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAIL Formula Generator</title>
    <script>
      // Apply the persisted theme before first paint so dark-mode users never
      // see a flash of the light theme. Mirrors readTheme() in src/ui/store.ts.
      try {
        var t = localStorage.getItem('sailgen.theme');
        if (t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
